name: Build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --quiet

      - name: Create zip
        run: |
          zip -rq private-packages-licenses-helper.zip . \
            --exclude='.git/*' \
            --exclude='.github/*' \
            --exclude='.gitignore' \
            --exclude='.claude' \
            --exclude='phpstan.neon' \
            --exclude='composer.json' \
            --exclude='composer.lock'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-packages-licenses-helper
          path: private-packages-licenses-helper.zip

      - name: Create release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: private-packages-licenses-helper.zip
